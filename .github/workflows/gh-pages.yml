name: GitHub Pages

on:
  push:
    branches:
      - master
      - main
      - valaxy

# This workflow deploys by pushing build output to the `gh-pages` branch.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Valaxy blog
        run: pnpm run build

      # Prevent deploying a broken/empty site (which would overwrite `gh-pages`).
      - name: Verify build output
        run: |
          ls -la dist
          test -f dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
